<!DOCTYPE html>
<html>
<head>
    <title>Picture Gallery Page</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #fafafa;
            margin: 0;
            padding: 20px;
        }

        h2 {
            text-align: center;
        }

        #image-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 10px;
            max-width: 1000px;
            margin: auto;
        }

        .image-block {
            width: 100%;
            aspect-ratio: 1 / 1;   /* Makes square blocks */
            overflow: hidden;
            border-radius: 8px;
            background-color: #eee;
        }

        .image-block img {
            width: 100%;
            height: 100%;
            object-fit: cover;   /* Crops like Instagram */
            transition: transform 0.3s ease;
        }

        .image-block img:hover {
            transform: scale(1.05);
        }

        .header-bar {
    max-width: 1000px;
    margin: 0 auto 20px auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.header-bar h2 {
    margin: 0;
}

.search-box {
    display: flex;
    gap: 8px;
}

.search-box input {
    padding: 6px 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

.search-box button {
    padding: 6px 12px;
    border-radius: 6px;
    border: none;
    background-color: #0078d4;
    color: white;
    cursor: pointer;
}

.search-box button:hover {
    background-color: #005fa3;
}

.comment-box {
    margin-top: 8px;
    display: flex;
    flex-direction: column;
    gap: 5px;
}

.comment-box textarea {
    width: 100%;
    border-radius: 6px;
    padding: 5px;
    border: 1px solid #ccc;
}

.comment-box button {
    align-self: flex-end;
    padding: 5px 10px;
    border: none;
    background-color: #28a745;
    color: white;
    border-radius: 5px;
    cursor: pointer;
}

.comment-box button:hover {
    background-color: #218838;
}

    </style>

    <script>
    document.addEventListener("DOMContentLoaded", async function() {
        try {
            const response = await fetch("https://cw2upload-bcgrhfemchgdc7aj.norwayeast-01.azurewebsites.net/gallery");

            if (!response.ok) {
                throw new Error("Failed to fetch images");
            }

            document.getElementById("searchBtn").addEventListener("click", searchImage);
            const result = await response.json();
            const container = document.getElementById('image-container');

            result.forEach(element => {

                const block = document.createElement('div');
                block.className = "image-block";

                const img = document.createElement('img');
                img.src = element; 

                img.addEventListener("click", function () {

                // Prevent duplicate comment boxes
                if (block.querySelector(".comment-box")) return;

                const commentBox = document.createElement("div");
                commentBox.className = "comment-box";

                const textarea = document.createElement("textarea");
                textarea.placeholder = "Write a comment...";
                textarea.rows = 3;

                const button = document.createElement("button");
                button.textContent = "Post";

                button.onclick = function () {
                    const commentText = textarea.value;
                    if (commentText.trim() !== "") {
                        const comment = document.createElement("p");
                        comment.textContent = commentText;
                        commentBox.appendChild(comment);
                        textarea.value = "";
                    }
                };

                commentBox.appendChild(textarea);
                commentBox.appendChild(button);

                block.appendChild(commentBox);
            });

                
                block.appendChild(img);
                container.appendChild(block);

            });

        } catch (error) {
            console.error(error);
            alert("Error loading Gallery");
        }
    });

    async function searchImage() {
    const container = document.getElementById('image-container');
    container.innerHTML = "";

    var textbox = document.getElementById("img_name")

    const formData = new FormData();
    formData.append("query", textbox.value);

    try {
            const response = await fetch("https://cw2upload-bcgrhfemchgdc7aj.norwayeast-01.azurewebsites.net/find", {
                method: "POST",
                headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                query: textbox.value
            })
            });
    
            const result = await response.json();

            if (response.ok) {
                const block = document.createElement('div');
                block.className = "image-block";

                const img = document.createElement('img');
                img.src = result['imageUrl']; 

                block.appendChild(img);
                container.appendChild(block);
        } else {
            alert("search failed: " + result.error);
        }           
    
    
        } catch (error) {
            console.error(error);
            alert("Error searching ");
        }
}
    </script>
</head>

<body>
    <div class="header-bar">
    <h2>Picture Gallery</h2>

    <div class="search-box">
        <input type="text" id="img_name" placeholder="Search image...">
        <button type="button" id = "searchBtn">Search</button>
    </div>
</div>
    <div id="image-container"></div>
</body>
</html>


<!DOCTYPE html>
<html>
<head>
    <title>Picture Gallery Page</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #e6f4ea; /* light green */
            margin: 0;
            padding: 20px;
        }

        h2 {
            text-align: center;
        }

        #image-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 10px;
            max-width: 1000px;
            margin: auto;
        }

        .image-block {
            width: 100%;
            overflow: hidden;
            border-radius: 8px;
            background-color: #fff;
            border: 1px solid #ddd;
        }

        .image-block img {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            display: block;
            transition: transform 0.3s ease;
        }

        .image-block img:hover {
            transform: scale(1.05);
        }

        .header-bar {
            max-width: 1000px;
            margin: 0 auto 20px auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-bar h2 {
            margin: 0;
        }

        .search-box {
            display: flex;
            gap: 8px;
        }

        select.action-btn {
            border: 1px solid #ccc;
            background-color: #fff;
            font-size: 13px;
        }

        .search-box input {
            padding: 6px 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        .search-box button {
            padding: 6px 12px;
            border-radius: 6px;
            border: none;
            background-color: #0078d4;
            color: white;
            cursor: pointer;
        }

        .search-box button:hover {
            background-color: #005fa3;
        }

        /* ---- Like & Comment styles ---- */
        .card-actions {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 12px;
            background: #fff;
        }

        .action-btn {
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 13px;
            color: #555;
            padding: 4px 6px;
            border-radius: 6px;
        }

        .action-btn:hover {
            background-color: #f0f0f0;
        }

        .like-btn.liked .heart {
            color: #e74c3c;
        }

        .comment-panel {
            border-top: 1px solid #eee;
            padding: 10px 12px;
            display: none;
            flex-direction: column;
            gap: 8px;
            background: #fff;
        }

        .comment-panel.open {
            display: flex;
        }

        .comment-item {
            font-size: 13px;
            background: #f5f5f5;
            border-radius: 6px;
            padding: 6px 8px;
        }

        .comment-item .ts {
            font-size: 11px;
            color: #999;
            margin-left: 6px;
        }

        .comment-input-row {
            display: flex;
            gap: 6px;
        }

        .comment-input-row textarea {
            flex: 1;
            padding: 6px 8px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 13px;
            resize: none;
            font-family: Arial, sans-serif;
        }

        .comment-input-row button {
            padding: 6px 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            cursor: pointer;
            font-size: 12px;
            background: #fff;
        }

        .comment-input-row button:hover {
            background-color: #f0f0f0;
        }
    </style>

    <script>
    document.addEventListener("DOMContentLoaded", async function() {
        try {
            const response = await fetch("https://cw2upload-bcgrhfemchgdc7aj.norwayeast-01.azurewebsites.net/gallery");

            if (!response.ok) {
                throw new Error("Failed to fetch images");
            }

            document.getElementById("searchBtn").addEventListener("click", searchImage);
            const result = await response.json();
            const container = document.getElementById('image-container');

            result.forEach(element => {

                // Outer card
                const block = document.createElement('div');
                block.className = "image-block";

                // Image
                const img = document.createElement('img');
                img.src = element;
                block.appendChild(img);

                // --- Action bar (Like + Comment toggle) ---
                const actions = document.createElement('div');
                actions.className = "card-actions";

                // Rating dropdown (1–10)
                const ratingSelect = document.createElement('select');
                ratingSelect.className = "action-btn";

                // Default option
                const defaultOption = document.createElement('option');
                defaultOption.value = "";
                defaultOption.textContent = "Rate (1–10)";
                defaultOption.disabled = true;
                defaultOption.selected = true;
                ratingSelect.appendChild(defaultOption);

                // Add options 1–10
                for (let i = 1; i <= 10; i++) {
                    const option = document.createElement('option');
                    option.value = i;
                    option.textContent = i;
                    ratingSelect.appendChild(option);
                }

                // Optional: handle rating change
                ratingSelect.addEventListener('change', () => {
                    console.log("User rated:", ratingSelect.value);
                });

                // Comment toggle button
                const commentToggle = document.createElement('button');
                commentToggle.className = "action-btn";
                commentToggle.innerHTML = '<span style="font-size:15px">&#128172;</span><span>Comment</span>';

                actions.appendChild(ratingSelect);
                actions.appendChild(commentToggle);
                block.appendChild(actions);

                // --- Comment panel ---
                const panel = document.createElement('div');
                panel.className = "comment-panel";

                const commentList = document.createElement('div');

                const inputRow = document.createElement('div');
                inputRow.className = "comment-input-row";

                const textarea = document.createElement('textarea');
                textarea.rows = 2;
                textarea.placeholder = "Write a comment...";

                const postBtn = document.createElement('button');
                postBtn.textContent = "Post";
                postBtn.addEventListener('click', () => {
                    if (!textarea.value.trim()) return;
                    const item = document.createElement('div');
                    item.className = "comment-item";
                    const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    item.innerHTML = textarea.value + '<span class="ts">' + now + '</span>';
                    commentList.appendChild(item);
                    textarea.value = "";
                });

                inputRow.appendChild(textarea);
                inputRow.appendChild(postBtn);
                panel.appendChild(commentList);
                panel.appendChild(inputRow);
                block.appendChild(panel);

                // Toggle comment panel
                commentToggle.addEventListener('click', () => panel.classList.toggle('open'));

                container.appendChild(block);
            });

        } catch (error) {
            console.error(error);
            alert("Error loading Gallery");
        }
    });

    async function searchImage() {
        const container = document.getElementById('image-container');
        container.innerHTML = "";

        var textbox = document.getElementById("img_name");

        try {
            const response = await fetch("https://cw2upload-bcgrhfemchgdc7aj.norwayeast-01.azurewebsites.net/find", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    query: textbox.value
                })
            });

            const result = await response.json();

            if (response.ok) {
                result.imageUrl.forEach(url => {
                    const block = document.createElement('div');
                    block.className = "image-block";

                    const img = document.createElement('img');
                    img.src = url;

                    block.appendChild(img);
                    container.appendChild(block);
                });
            } else {
                alert("search failed: " + result.error);
            }

        } catch (error) {
            console.error(error);
            alert("Error searching ");
        }
    }
    </script>
</head>

<body>
    <div class="header-bar">
        <h2>Picture Gallery</h2>
        <div class="search-box">
            <input type="text" id="img_name" placeholder="Search image...">
            <button type="button" id="searchBtn">Search</button>
        </div>
    </div>
    <div id="image-container"></div>
</body>
</html>

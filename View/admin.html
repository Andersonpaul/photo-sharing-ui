<!DOCTYPE html>
<html>
<head>
    <title>Admin Page for Photo Sharing App</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #e6f4ea; /* light green */
            margin: 0;
            padding: 0;
        }

        .container {
            width: 400px;
            margin: 60px auto;
            background: white;
            padding: 25px 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 15px;
        }

        .form-group label {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .form-group input {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .form-group input:focus {
            border-color: #4CAF50;
            outline: none;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }

        #preview {
            display: block;
            margin: 20px auto 0;
            border-radius: 8px;
            max-width: 100%;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Upload Pictures</h2>

    <form onsubmit="uploadImage(event)">

        <div class="form-group">
            <label for="imageName">Image Name</label>
            <input type="text" id="imageName" required>
        </div>

        <div class="form-group">
            <label for="title">Title</label>
            <input type="text" id="title" required>
        </div>

        <div class="form-group">
            <label for="location">Location</label>
            <input type="text" id="location" required>
        </div>

        <div class="form-group">
            <label for="imageInput">Picture</label>
            <input type="file" id="imageInput" name="filename">
        </div>

        <button type="submit">Upload</button>

        <img id="preview"/>

    </form>
</div>

<script>
async function uploadImage(event) {

    event.preventDefault();

    const fileInput = document.getElementById("imageInput");
    const file = fileInput.files[0];

    if (!file) {
        alert("Please select a file");
        return;
    }

    const formData = new FormData();
    formData.append("image", file);
    formData.append("name", document.getElementById("imageName").value);
    formData.append("caption", document.getElementById("title").value);
    formData.append("area_location", document.getElementById("location").value);

    try {
        const response = await fetch("https://cw2upload-bcgrhfemchgdc7aj.norwayeast-01.azurewebsites.net/upload", {
            method: "POST",
            body: formData
        });

        const result = await response.json();

        if (response.ok) {
            document.getElementById("preview").src = result.image_url;
            alert("Upload successful!");
        } else {
            alert("Upload failed: " + result.error);
        }

    } catch (error) {
        console.error(error);
        alert("Error uploading image");
    }
}
</script>

</body>
</html>
